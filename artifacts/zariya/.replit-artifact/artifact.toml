kind = "web"
previewPath = "/"
title = "Zariya — Local Economic Infrastructure"
version = "1.0.0"
id = "artifacts/zariya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26163

[services.development]
run = "pnpm --filter @workspace/zariya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zariya", "run", "build" ]
publicDir = "artifacts/zariya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26163"
BASE_PATH = "/"
